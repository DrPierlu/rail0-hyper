# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
# Development environment — ARC Testnet only.
# Run `node bin/gen-config` to patch start_block values from rail0-api.

name: rail0-hyper
description: RAIL0 payment event indexer — Envio HyperSync edition

# ── Global field selection ────────────────────────────────────────────────────
# gas fields (gasUsed, effectiveGasPrice) and baseFeePerGas are required for
# the GET /transactions/:tx_hash endpoint.
#
# NOTE: selecting transaction_fields triggers an additional RPC call (receipt)
# per event to populate gas data. This is equivalent to Ponder's
# includeTransactionReceipts: true. Evaluate the RPC cost vs. benefit before
# enabling on high-volume chains or paid providers.
field_selection:
  transaction_fields:
    - hash
    - from
    - nonce
    - gas
    - gasUsed
    - effectiveGasPrice
    # - to                    # recipient address
    # - value                 # ETH transferred (wei)
    # - input                 # calldata
    # - gas_price             # gas price for legacy txs (pre-EIP-1559)
    # - max_fee_per_gas       # EIP-1559 max total fee per gas
    # - max_priority_fee_per_gas  # EIP-1559 miner tip per gas
    # - type                  # tx type: 0=legacy 1=EIP-2930 2=EIP-1559
    # - chain_id              # chain the tx was signed for
    # - transaction_index     # position within the block
    # - cumulative_gas_used   # total gas used in block up to this tx
    # - v                     # ECDSA signature component
    # - r                     # ECDSA signature component
    # - s                     # ECDSA signature component
  block_fields:
    - baseFeePerGas           # EIP-1559 base fee burned per gas
    # - number                # block height
    # - hash                  # block hash
    # - timestamp             # Unix timestamp (seconds)
    # - gas_limit             # max gas allowed in the block
    # - gas_used              # total gas consumed by all txs
    # - miner                 # validator / miner address
    # - parent_hash           # hash of the previous block
    # - size                  # block size in bytes
    # - transactions_root     # Merkle root of transactions trie
    # - state_root            # Merkle root of state trie
    # - receipts_root         # Merkle root of receipts trie
    # - logs_bloom            # bloom filter of all log topics/addresses
    # - difficulty            # PoW difficulty (pre-Merge only)
    # - total_difficulty      # cumulative PoW difficulty (pre-Merge only)
    # - extra_data            # arbitrary data field set by the miner
    # - uncles                # list of uncle block hashes
    # - nonce                 # PoW nonce (pre-Merge only)
    # - sha3_uncles           # hash of the uncles list

# ── Contract definitions ──────────────────────────────────────────────────────
contracts:
  - name: RAIL0
    handler: ./src/handlers.ts
    events:
      - event: "PaymentAuthorized(bytes32 indexed paymentId, address indexed payer, address indexed payee, (address,address,address,uint120,uint48,uint48) payment)"
      - event: "PaymentCharged(bytes32 indexed paymentId, address indexed payer, address indexed payee, (address,address,address,uint120,uint48,uint48) payment)"
      - event: "PaymentCaptured(bytes32 indexed paymentId, address indexed payer, address indexed payee, uint256 amount)"
      - event: "PaymentVoided(bytes32 indexed paymentId, address indexed payer, address indexed payee, uint256 amount)"
      - event: "PaymentReleased(bytes32 indexed paymentId, address indexed payer, address indexed payee, uint256 amount)"
      - event: "PaymentRefunded(bytes32 indexed paymentId, address indexed payer, address indexed payee, uint256 amount)"

# ── Chain / network configuration ─────────────────────────────────────────────
networks:
  - id: 5042002
    start_block: 43959245 # rpc-binary-search
    rpc: https://rpc.testnet.arc.network
    contracts:
      - name: RAIL0
        address:
          - "0xcEA3E28cb387929876F7b1c452460fF3F40C40B7" # v0.7.0
          - "0x0e393A626EfC45EBd030EBB997CDa207013C4364" # v0.9.0
          - "0x4CCC4DdeBB8A63B9186936A8C0FA404910A4311b" # v1.0.0
